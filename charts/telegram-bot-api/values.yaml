replicaCount: 1

image:
  repository: ghcr.io/aiogram/telegram-bot-api
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8081

# Required Telegram API credentials.
# Prefer setting these through --set-string or a custom values file.
telegram:
  apiId: ""
  apiHash: ""

# Extra command-line arguments passed to telegram-bot-api.
# Example:
# extraArgs:
#   - --local
#   - --verbosity=3
extraArgs: []

# Additional environment variables for the container.
extraEnv: []

persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  storageClass: ""
  annotations: {}

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
